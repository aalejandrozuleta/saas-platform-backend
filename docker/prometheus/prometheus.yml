global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # ============================
  # API GATEWAY
  # ============================
  - job_name: "api-gateway"
    metrics_path: /v1/metrics
    static_configs:
      - targets:
          - api-gateway:3000
        labels:
          service: api-gateway

  # ============================
  # AUTH SERVICE
  # ============================
  - job_name: "auth-service"
    metrics_path: /auth/v1/metrics
    static_configs:
      - targets:
          - auth-service:3001
        labels:
          service: auth-service

  # ============================
  # POSTGRES EXPORTER
  # ============================
  - job_name: "postgres-exporter"
    static_configs:
      - targets:
          - postgres-exporter:9187

  # ============================
  # REDIS EXPORTER
  # ============================
  - job_name: "redis-exporter"
    static_configs:
      - targets:
          - redis-exporter:9121

  # ============================
  # CADVISOR (Container Metrics)
  # ============================
  - job_name: "cadvisor"
    static_configs:
      - targets:
          - cadvisor:8080

  # ============================
  # PROMETHEUS SELF-MONITORING
  # ============================
  - job_name: "prometheus"
    static_configs:
      - targets:
          - localhost:9090
