name: saas-platform-dev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # =====================
  # NGINX
  # =====================
  nginx:
    image: ${NGINX_IMAGE:-nginx:stable-alpine}
    container_name: nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/sites/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_started
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # API GATEWAY
  # =====================
  api-gateway:
    container_name: api-gateway-dev
    init: true
    restart: unless-stopped
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile.dev
    env_file:
      - ../services/api-gateway/.env
    volumes:
      - ../services/api-gateway:/app/services/api-gateway
      - ../shared:/app/shared
      - pnpm-store:/pnpm-store
    environment:
      PNPM_STORE_PATH: /pnpm-store
    ports:
      - "3000:3000"
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # AUTH SERVICE
  # =====================
  auth-service:
    container_name: auth-service-dev
    init: true
    restart: unless-stopped
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile.dev
    env_file:
      - ../services/auth-service/.env
    volumes:
      - ../services/auth-service:/app/services/auth-service
      - ../shared:/app/shared
      - pnpm-store:/pnpm-store
    environment:
      PNPM_STORE_PATH: /pnpm-store
    ports:
      - "3001:3001"
    depends_on:
      auth-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_started
    logging: *default-logging
    networks:
      - saas-dev
  # =====================
  # POSTGRES
  # =====================
  auth-postgres:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    container_name: auth-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # REDIS
  # =====================
  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # MONGO
  # =====================
  mongo:
    image: ${MONGO_IMAGE:-mongo:8-noble}
    container_name: mongo-dev
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"quit(db.runCommand({ ping: 1 }).ok ? 0 : 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # PROMETHEUS
  # =====================
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.10.0}
    container_name: prometheus-dev
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # LOKI
  # =====================
  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.6.4}
    container_name: loki-dev
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yml
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # ALLOY (Logs -> Loki)
  # =====================
  alloy:
    image: ${ALLOY_IMAGE:-grafana/alloy:v1.14.0}
    container_name: alloy-dev
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./alloy/alloy.local.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy
    command:
      - run
      - --storage.path=/var/lib/alloy
      - /etc/alloy/config.alloy
    depends_on:
      - loki
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # GRAFANA
  # =====================
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12.3.5}
    container_name: grafana-dev
    restart: unless-stopped
    ports:
      - "3005:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # MAILPIT
  # =====================
  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:v1.29.3}
    container_name: mailpit-dev
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # PGADMIN
  # =====================
  pgadmin:
    image: ${PGADMIN_IMAGE:-dpage/pgadmin4:9.13.0}
    container_name: pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      auth-postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # REDIS COMMANDER
  # =====================
  redisinsight:
    image: ${REDISINSIGHT_IMAGE:-redis/redisinsight:3.2.0}
    container_name: redisinsight-dev
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    networks:
      - saas-dev

  # =====================
  # MONGO EXPRESS
  # =====================
  mongo-express:
    image: ${MONGO_EXPRESS_IMAGE:-mongo-express:1.0.2-20-alpine3.19}
    container_name: mongo-express-dev
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8082:8081"
    depends_on:
      mongo:
        condition: service_started
    logging: *default-logging
    networks:
      - saas-dev

# =====================
# NETWORK
# =====================
networks:
  saas-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =====================
# VOLUMES
# =====================
volumes:
  auth-postgres-data:
  mongo-data:
  loki-data:
  prometheus-data:
  grafana-data:
  pgadmin-data:
  alloy-data:
  pnpm-store:
