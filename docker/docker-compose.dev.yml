name: saas-platform-dev

services:

  nginx:
    image: nginx:1.29.6-alpine
    container_name: nginx-dev
    entrypoint: ["nginx", "-g", "daemon off;"]
    ports:
      - "80:80"
    volumes:
      - ./nginx/sites/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./nginx/sites/default.conf
          target: /etc/nginx/conf.d/default.conf
    networks:
      - saas-dev

  api-gateway:
    container_name: api-gateway-dev
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile.dev
    env_file:
      - ../services/api-gateway/.env
    volumes:
      - ../:/app
      - workspace-node_modules:/app/node_modules
      - api-service-node_modules:/app/services/api-gateway/node_modules
      - shared-node_modules:/app/shared/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    develop:
      watch:
        - action: sync+restart
          path: ../services/api-gateway/.env
          target: /app/services/api-gateway/.env
        - action: rebuild
          path: ../package.json
        - action: rebuild
          path: ../pnpm-lock.yaml
        - action: rebuild
          path: ../pnpm-workspace.yaml
        - action: rebuild
          path: ../.npmrc
        - action: rebuild
          path: ../shared/package.json
        - action: rebuild
          path: ../services/api-gateway/package.json
        - action: rebuild
          path: ../services/api-gateway/Dockerfile.dev
    networks:
      - saas-dev

  auth-service:
    container_name: auth-service-dev
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile.dev
    env_file:
      - ../services/auth-service/.env
    volumes:
      - ../:/app
      - workspace-node_modules:/app/node_modules
      - auth-service-node_modules:/app/services/auth-service/node_modules
      - shared-node_modules:/app/shared/node_modules
    ports:
      - "3001:3001"
    depends_on:
      auth-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/metrics >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    develop:
      watch:
        - action: sync+restart
          path: ../services/auth-service/.env
          target: /app/services/auth-service/.env
        - action: sync+restart
          path: ../services/auth-service/prisma
          target: /app/services/auth-service/prisma
        - action: rebuild
          path: ../package.json
        - action: rebuild
          path: ../pnpm-lock.yaml
        - action: rebuild
          path: ../pnpm-workspace.yaml
        - action: rebuild
          path: ../.npmrc
        - action: rebuild
          path: ../shared/package.json
        - action: rebuild
          path: ../services/auth-service/package.json
        - action: rebuild
          path: ../services/auth-service/Dockerfile.dev
    networks:
      - saas-dev

  auth-postgres:
    image: postgres:17-alpine
    container_name: auth-postgres-dev
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      retries: 5
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - saas-dev

  redis:
    image: redis:8.0.6-alpine
    container_name: redis-dev
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - saas-dev

  mongo:
    image: mongo:8.2
    container_name: mongo-dev
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 10s
      retries: 5
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - saas-dev

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - saas-dev

  loki:
    image: grafana/loki:3.5.12
    container_name: loki-dev
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - saas-dev

  promtail:
    image: grafana/promtail:3.5.12
    container_name: promtail-dev
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    networks:
      - saas-dev

  grafana:
    image: grafana/grafana:12.4.1
    container_name: grafana-dev
    ports:
      - "3005:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - saas-dev

  mailpit:
    image: axllent/mailpit:v1.29.3
    container_name: mailpit-dev
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - saas-dev

  pgadmin:
    image: dpage/pgadmin4:9.13.0
    container_name: pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - saas-dev

  redisinsight:
    image: redis/redisinsight:3.2.0
    container_name: redisinsight-dev
    environment:
      RI_ACCEPT_TERMS_AND_CONDITIONS: "yes"
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    networks:
      - saas-dev

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: mongo-express-dev
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8082:8081"
    networks:
      - saas-dev

networks:
  saas-dev:
    driver: bridge

volumes:
  auth-postgres-data:
  redis-data:
  mongo-data:
  prometheus-data:
  loki-data:
  grafana-data:
  pgadmin-data:
  redisinsight-data:

  workspace-node_modules:
  api-service-node_modules:
  auth-service-node_modules:
  shared-node_modules:
