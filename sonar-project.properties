sonar.projectKey=aalejandrozuleta_saas-platform-backend
sonar.organization=aalejandrozuleta
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Source configuration
sonar.sources=services,shared
sonar.tests=services,shared

# Typescript configs
sonar.typescript.tsconfigPaths=services/api-gateway/tsconfig.json,services/auth-service/tsconfig.json,shared/tsconfig.json

# Exclusions
sonar.exclusions=\
**/dist/**,\
**/node_modules/**,\
**/coverage/**,\
**/*.d.ts,\
**/generated/**,\
docker/**,\
docs/**,\
**/*.module.ts,\
**/main.ts

# Test files
sonar.test.inclusions=\
**/*.spec.ts,\
**/*.test.ts,\
**/__tests__/**

# Coverage reports
sonar.javascript.lcov.reportPaths=\
services/**/coverage/lcov.info,\
shared/**/coverage/lcov.info

# Coverage exclusions
sonar.coverage.exclusions=\
**/*.spec.ts,\
**/*.test.ts,\
**/__tests__/**,\
**/*.module.ts,\
**/main.ts,\
**/*.d.ts,\
**/generated/**

# Duplication exclusions
sonar.cpd.exclusions=\
**/*.spec.ts,\
**/*.test.ts,\
**/__tests__/**,\
**/generated/**

# Ignore specific docker rule
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S6504
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Dockerfile*

# New code reference branch
sonar.newCode.referenceBranch=main