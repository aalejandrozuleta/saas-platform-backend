# Identificación del proyecto
sonar.projectKey=saas-platform-backend
sonar.organization=aalejandrozuleta
sonar.host.url=https://sonarcloud.io

# Codificación
sonar.sourceEncoding=UTF-8

# Código fuente
sonar.sources=services,shared

# Exclusiones del código analizado
sonar.exclusions=\
**/dist/**,\
**/node_modules/**,\
**/*.module.ts,\
**/main.ts

# Tests
sonar.tests=services,shared
sonar.test.inclusions=\
**/*.spec.ts,\
**/*.test.ts,\
**/__tests__/**

# Coverage
sonar.javascript.lcov.reportPaths=\
services/**/coverage/lcov.info,\
shared/**/coverage/lcov.info

# Ignorar reglas específicas
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S6504
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Dockerfile*