name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  setup:
    uses: ./.github/workflows/setup-node.yml

  docs:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate docs
        run: pnpm docs:code

      - name: Deploy docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/code