name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  detect-services:
    name: Detect Services
    runs-on: ubuntu-latest

    outputs:
      services: ${{ steps.set-matrix.outputs.services }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect service directories
        id: set-matrix
        run: |
          SERVICES=$(ls -d services/*/ | cut -d'/' -f2 | jq -R -s -c 'split("\n")[:-1]')
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  trivy:
    name: Scan Docker Images
    runs-on: ubuntu-latest
    needs: detect-services

    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-services.outputs.services) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
          -f services/${{ matrix.service }}/Dockerfile.prod \
          -t ${{ matrix.service }}:latest \
          .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ matrix.service }}:latest
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif