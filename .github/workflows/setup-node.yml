name: Setup Node Environment

on:
  workflow_call:

jobs:
  setup:
    runs-on: ubuntu-latest

    outputs:
      cache-hit: ${{ steps.cache-prisma.outputs.cache-hit }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Get pnpm store
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Prisma
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.prisma
            services/**/generated/prisma
          key: prisma-${{ hashFiles('**/schema.prisma') }}

      - name: Generate Prisma
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: pnpm --filter auth-service exec prisma generate