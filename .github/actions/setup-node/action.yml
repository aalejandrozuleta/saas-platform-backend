name: Setup Node Environment
description: Setup Node, pnpm, cache and prisma

runs:
  using: composite
  steps:

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Cache Prisma
      id: cache-prisma
      uses: actions/cache@v4
      with:
        path: |
          **/node_modules/.prisma
          **/generated/prisma
        key: prisma-${{ runner.os }}-${{ hashFiles('**/schema.prisma') }}

    - name: Generate Prisma Client
      if: steps.cache-prisma.outputs.cache-hit != 'true'
      shell: bash
      run: pnpm --filter "./services/*" exec prisma generate